<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DryRide - מזג אוויר למסלול</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Rubik', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-800 min-h-screen">

    <div class="max-w-md mx-auto pt-8 pb-12 px-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800"><i class="fa-solid fa-motorcycle text-blue-600 mr-2"></i>
                DryRide</h1>
            <p class="text-gray-500 mt-2">סע יבש. תכנון מסלול חכם לרוכבים.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <form id="routeForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">מוצא</label>
                    <input type="text" id="origin" value="נתניה" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">יעד</label>
                    <input type="text" id="destination" value="ירושלים" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">תאריך ושעת יציאה</label>
                    <input type="datetime-local" id="departureTime" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg mt-4 hover:bg-blue-700 transition flex justify-center items-center">
                    <span id="btnText">בדוק מסלול</span>
                    <i id="loadingIcon" class="fa-solid fa-spinner fa-spin hidden ml-2"></i>
                </button>
            </form>
        </div>

        <div id="resultsSection" class="hidden space-y-4">

            <div class="bg-slate-800 text-white rounded-xl p-4 text-center shadow">
                <p class="text-sm text-slate-300">זמן נסיעה משוער</p>
                <p class="text-2xl font-bold" id="resDuration">-- דקות</p>
                <p class="text-xs text-slate-400 mt-1" id="resDistance">מרחק: -- ק"מ</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white rounded-xl p-4 shadow border border-gray-100">
                    <div class="text-xs text-gray-500 font-bold mb-1">🏠 במוצא (<span id="resOriginTime">--:--</span>)
                    </div>
                    <div class="text-lg font-bold text-gray-800 truncate" id="resOriginName">--</div>
                    <div class="mt-2 flex items-center justify-between">
                        <div class="text-xl text-blue-600 font-bold" id="resOriginTemp">--°</div>
                        <div class="text-sm font-medium bg-blue-50 text-blue-700 px-2 py-1 rounded" id="resOriginRain">
                            --% גשם</div>
                    </div>
                </div>

                <div class="bg-white rounded-xl p-4 shadow border border-gray-100">
                    <div class="text-xs text-gray-500 font-bold mb-1">🎯 ביעד (<span id="resDestTime">--:--</span>)
                    </div>
                    <div class="text-lg font-bold text-gray-800 truncate" id="resDestName">--</div>
                    <div class="mt-2 flex items-center justify-between">
                        <div class="text-xl text-blue-600 font-bold" id="resDestTemp">--°</div>
                        <div class="text-sm font-medium bg-blue-50 text-blue-700 px-2 py-1 rounded" id="resDestRain">--%
                            גשם</div>
                    </div>
                </div>
            </div>

            <div id="rainWarningBox" class="bg-white rounded-xl p-4 shadow border-l-4 border-yellow-400 hidden">
                <div class="flex items-start">
                    <i class="fa-solid fa-cloud-showers-heavy text-yellow-500 text-xl ml-3 mt-1"></i>
                    <div class="w-full">
                        <h3 class="font-bold text-gray-800">סיכוי שיא לגשם במסלול</h3>
                        <p class="text-sm text-gray-600 mt-1">
                            אחרי <span id="resMaxRainTime" class="font-bold">--</span> דקות נסיעה, באזור <span
                                id="resMaxRainLoc" class="font-bold">--</span>.
                        </p>
                        <div
                            class="mt-2 mb-3 inline-block bg-yellow-100 text-yellow-800 text-xs font-bold px-2 py-1 rounded">
                            סיכוי לגשם: <span id="resMaxRainPercent">--</span>%
                        </div>

                        <div id="mapContainer"
                            class="w-full h-40 rounded-lg overflow-hidden border border-yellow-200 hidden">
                            <iframe id="rainMap" width="100%" height="100%" frameborder="0" style="border:0" src=""
                                allowfullscreen loading="lazy"></iframe>
                        </div>
                    </div>
                </div>
            </div>

            <div id="clearRouteBox" class="bg-green-50 rounded-xl p-4 shadow border border-green-200 hidden">
                <div class="flex items-center text-green-700">
                    <i class="fa-solid fa-sun text-xl ml-3"></i>
                    <span class="font-bold">מסלול נקי מגשם! סע בדרכים טובות.</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        // קביעת טווח תאריכים מותר וזמן ברירת מחדל
        window.onload = () => {
            const departureInput = document.getElementById('departureTime');

            const toLocalISO = (date) => {
                return new Date(date.getTime() - (date.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
            };

            const now = new Date();
            departureInput.min = toLocalISO(now);

            const nextWeek = new Date(now);
            nextWeek.setDate(now.getDate() + 7);
            departureInput.max = toLocalISO(nextWeek);

            const defaultTime = new Date(now);
            defaultTime.setHours(now.getHours() + 1);
            departureInput.value = toLocalISO(defaultTime);
        };

        const extractTime = (isoString) => {
            const date = new Date(isoString);
            return date.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
        };

        // טיפול בשליחת הטופס
        document.getElementById('routeForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            const resultsSection = document.getElementById('resultsSection');

            btnText.innerText = 'מחשב מסלול...';
            loadingIcon.classList.remove('hidden');
            resultsSection.classList.add('hidden');

            const origin = document.getElementById('origin').value;
            const destination = document.getElementById('destination').value;
            const departureTime = document.getElementById('departureTime').value + ":00Z";

            try {
                const response = await fetch('http://127.0.0.1:8000/api/v1/check-route', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ origin, destination, departure_time: departureTime })
                });

                if (!response.ok) throw new Error('שגיאה בחישוב המסלול');

                const data = await response.json();
                const summary = data.summary;

                document.getElementById('resDuration').innerText = summary.total_duration_minutes + ' דקות';
                document.getElementById('resDistance').innerText = 'מרחק: ' + summary.total_distance_km + ' ק"מ';

                document.getElementById('resOriginName').innerText = origin;
                document.getElementById('resOriginTime').innerText = extractTime(summary.origin_weather.eta);
                document.getElementById('resOriginTemp').innerText = summary.origin_weather.temperature + '°';
                document.getElementById('resOriginRain').innerText = summary.origin_weather.rain_chance_percent + '% גשם';

                document.getElementById('resDestName').innerText = destination;
                document.getElementById('resDestTime').innerText = extractTime(summary.destination_weather.eta);
                document.getElementById('resDestTemp').innerText = summary.destination_weather.temperature + '°';
                document.getElementById('resDestRain').innerText = summary.destination_weather.rain_chance_percent + '% גשם';

                const warningBox = document.getElementById('rainWarningBox');
                const clearBox = document.getElementById('clearRouteBox');
                const mapContainer = document.getElementById('mapContainer');
                const rainMap = document.getElementById('rainMap');

                if (summary.max_rain_point && summary.max_rain_point.rain_chance_percent > 0) {
                    warningBox.classList.remove('hidden');
                    clearBox.classList.add('hidden');

                    document.getElementById('resMaxRainTime').innerText = summary.max_rain_point.driving_time_minutes;
                    document.getElementById('resMaxRainLoc').innerText = summary.max_rain_point.location_name.split(' (')[0];
                    document.getElementById('resMaxRainPercent').innerText = summary.max_rain_point.rain_chance_percent;

                    // הזרקת הקואורדינטות של הבקאנד אל תוך המפה של גוגל מפות!
                    const lat = summary.max_rain_point.lat;
                    const lon = summary.max_rain_point.lon;
                    rainMap.src = `https://maps.google.com/maps?q=${lat},${lon}&hl=he&z=13&output=embed`;

                    mapContainer.classList.remove('hidden');
                } else {
                    warningBox.classList.add('hidden');
                    clearBox.classList.remove('hidden');
                    mapContainer.classList.add('hidden');
                }

                resultsSection.classList.remove('hidden');

            } catch (error) {
                alert('אופס! משהו השתבש. ודא שהשרת רץ ונסה שוב.\n' + error.message);
            } finally {
                btnText.innerText = 'בדוק מסלול';
                loadingIcon.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
